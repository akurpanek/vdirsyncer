name: CardDAV Sync (G <> NC <> MB)
on:
  schedule:
    - cron: '0 * * * *' # Stündlich
  workflow_dispatch: # Manueller Start möglich

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install vdirsyncer
        run: |
          pip install vdirsyncer[google]
          pip install aiohttp-oauthlib
      - name: Prepare Config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          mkdir -p ~/.config/vdirsyncer/ ~/.vdirsyncer/status/
          
          # Token-Datei mit ALLEN notwendigen Daten für OAuth2 erstellen
          cat <<EOF > ~/.vdirsyncer/google_token.json
          {
            "client_id": "$GOOGLE_CLIENT_ID",
            "client_secret": "$GOOGLE_CLIENT_SECRET",
            "refresh_token": "$GOOGLE_REFRESH_TOKEN",
            "token_type": "Bearer"
          }
          EOF
          
          # Config erstellen
          envsubst < .vdirsyncer/config.template > ~/.config/vdirsyncer/config
      - name: Sync
        run: |
          vdirsyncer discover
          vdirsyncer sync
