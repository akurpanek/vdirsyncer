name: CardDAV Sync (G <> NC <> MB)
on:
  schedule:
    - cron: '0 * * * *' # Stündlich
  workflow_dispatch: # Manueller Start möglich

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install vdirsyncer
        run: |
          pip install vdirsyncer[google]
          pip install aiohttp-oauthlib
      - name: Prepare Config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
          MAILBOX_PASSWORD: ${{ secrets.MAILBOX_PASSWORD }}
        run: |
          mkdir -p ~/.config/vdirsyncer/ ~/.vdirsyncer/status/
          # Config erstellen (Variablen ersetzen)
          envsubst < .vdirsyncer/config.template > ~/.config/vdirsyncer/config
          # Google Token Datei absolut sauber erstellen
          printf '{"access_token": "", "refresh_token": "%s", "token_type": "Bearer", "expires_in": 3600}' "$GOOGLE_REFRESH_TOKEN" > ~/.vdirsyncer/google_token.json
      - name: Sync
        run: |
          vdirsyncer discover
          vdirsyncer sync
