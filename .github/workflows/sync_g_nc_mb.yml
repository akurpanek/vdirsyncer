name: CardDAV Sync (G <> NC <> MB)
on:
  schedule:
    - cron: '0 * * * *' # Stündlich
  workflow_dispatch: # Manueller Start möglich

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install vdirsyncer
        run: |
          pip install vdirsyncer[google] aiohttp-oauthlib

      - name: Prepare Config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          mkdir -p ~/.config/vdirsyncer/ ~/.vdirsyncer/status/
          python3 -c "
          import requests, json, time
          res = requests.post('https://googleapis.com', data={
              'client_id': '$GOOGLE_CLIENT_ID',
              'client_secret': '$GOOGLE_CLIENT_SECRET',
              'refresh_token': '$GOOGLE_REFRESH_TOKEN',
              'grant_type': 'refresh_token'
          }).json()
          res.update({'client_id': '$GOOGLE_CLIENT_ID', 'client_secret': '$GOOGLE_CLIENT_SECRET'})
          # Setze Ablaufdatum in die Zukunft
          res['expires_at'] = time.time() + res.get('expires_in', 3600)
          with open('/home/runner/.vdirsyncer/google_token.json', 'w') as f:
              json.dump(res, f)
          "
          envsubst < .vdirsyncer/config.template > ~/.config/vdirsyncer/config
      
      - name: Sync
        run: |
          # Nutze -vdebug für maximale Details
          yes | vdirsyncer -vdebug discover
          vdirsyncer -vdebug sync
