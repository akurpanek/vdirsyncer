name: CardDAV Sync (G <> NC <> MB)
on:
  schedule:
    - cron: '0 * * * *' # Stündlich
  workflow_dispatch: # Manueller Start möglich

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install vdirsyncer
        run: |
          pip install vdirsyncer[google]
          pip install aiohttp-oauthlib
      - name: Prepare Config
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          mkdir -p ~/.config/vdirsyncer/ ~/.vdirsyncer/status/
          
          # WICHTIG: Der Refresh-Token muss absolut sauber sein
          CLEAN_TOKEN=$(echo "$GOOGLE_REFRESH_TOKEN" | tr -d '\n' | tr -d '\r' | tr -d ' ')
          
          # Wir erstellen eine "vollständige" Token-Datei. 
          # Wir setzen "expires_at" auf 0, damit vdirsyncer sofort merkt: "Token abgelaufen, ich muss refreshen!"
          cat <<EOF > ~/.vdirsyncer/google_token.json
          {
            "access_token": "expired",
            "refresh_token": "$CLEAN_TOKEN",
            "client_id": "$GOOGLE_CLIENT_ID",
            "client_secret": "$GOOGLE_CLIENT_SECRET",
            "token_type": "Bearer",
            "expires_at": 0
          }
          EOF
          
          # Konfiguration aus Template erstellen
          envsubst < .vdirsyncer/config.template > ~/.config/vdirsyncer/config
      - name: Sync
        run: |
          # Nutze -vdebug für maximale Details
          yes | vdirsyncer -vdebug discover
          vdirsyncer -vdebug sync
